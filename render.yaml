services:
  - type: web
    name: rx-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: SQLITE_PATH
        value: /var/data/rxai.db
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: CORS_ORIGINS
        value: https://bisarx-8ym0.onrender.com,https://openpharmacy.online,https://www.openpharmacy.online,https://rx-ai-six.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https?://(www\.)?openpharmacy\.online$
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_ACCESS_CODE
        sync: false
      - key: MOOLRE_BASE_URL
        value: https://api.moolre.com
      - key: MOOLRE_SMS_PATH
        value: /open/sms/send
      - key: MOOLRE_PAYMENT_PATH
        value: /embed/link
      - key: MOOLRE_API_USER
        sync: false
      - key: MOOLRE_API_KEY
        sync: false
      - key: MOOLRE_API_PUBKEY
        sync: false
      - key: MOOLRE_API_VASKEY
        sync: false
      - key: MOOLRE_ACCOUNT_NUMBER
        sync: false
      - key: MOOLRE_SMS_SENDER_ID
        sync: false
      - key: MOOLRE_BUSINESS_EMAIL
        sync: false
      - key: MOOLRE_PAYMENT_CALLBACK_URL
        sync: false
      - key: MOOLRE_PAYMENT_REDIRECT_URL
        sync: false
