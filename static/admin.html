<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BisaRx – Admin Portal</title>
  <meta name="description" content="BisaRx: System management and oversight.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260409-4">
</head>
<body data-portal="admin" class="portal-locked">
<style>
  body.portal-locked #main-app { display:none; }
  #portal-gate {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    background:radial-gradient(circle at top, rgba(26,122,74,0.12), transparent 48%), linear-gradient(180deg, #f8fbf9 0%, #eef4f1 100%);
  }
  body:not(.portal-locked) #portal-gate { display:none; }
  .portal-gate-card {
    width:min(100%, 620px);
    padding:40px 32px;
    border-radius:28px;
    background:#ffffff;
    border:1px solid rgba(15,23,42,0.08);
    box-shadow:0 24px 60px rgba(15,23,42,0.12);
    text-align:center;
  }
</style>

<!-- LOGIN MODAL -->
<div id="login-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <button class="modal-close" onclick="closeLoginModal()">&#x2715;</button>
    <div class="login-header">
      <img src="logo.png" alt="BisaRx Logo" class="modal-logo">
      <h2>BisaRx Admin</h2>
      <p>Secure System Access</p>
    </div>
    <form id="form-login" onsubmit="event.preventDefault(); doLogin();">
      <div class="auth-role-switch" style="display:none;">
        <button type="button" id="login-role-admin" data-role="admin" class="on"></button>
      </div>
      <p class="auth-mode-help" id="login-mode-help">Secure Admin Access</p>
      <div class="form-group">
        <label for="login-username" id="login-username-label">Admin Username</label>
        <input type="text" id="login-username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" required autocomplete="current-password">
      </div>
      <div id="login-err" role="alert"></div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-do-login">Enter Dashboard</button>
    </form>
  </div>
</div>

<div id="portal-gate">
  <div class="portal-gate-card">
    <h1>Admin Control Center</h1>
    <p>Manage users, pharmacists, and system activity.</p>
    <button class="btn btn-primary" onclick="openLoginModal()">Admin Sign In</button>
  </div>
</div>

<div id="main-app">
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="logo.png" alt="Logo">
          <div class="sidebar-brand"><span class="brand-name">BisaRx</span><span class="brand-tag">Admin</span></div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item on" onclick="go('admin', this)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>System Overview</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout-link" onclick="signOut()">Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <section class="panel on" id="panel-admin">
        <div class="panel-header">
          <div class="panel-info">
            <h2>Admin Dashboard</h2>
            <p>Essential health system metrics and management</p>
          </div>
        </div>

        <div class="profile-tabs">
          <button class="profile-tab ntab on" onclick="showAdminTab('overview',this)">Statistics</button>
          <button class="profile-tab ntab" onclick="showAdminTab('pharmacists',this)">Manage Pharmacists</button>
          <button class="profile-tab ntab" onclick="showAdminTab('users',this)">User Directory</button>
        </div>

        <div id="admin-tab-overview">
          <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">Total Users</span><span class="stat-value" id="admin-total-users">0</span></div>
            <div class="stat-card"><span class="stat-label">Pharmacists</span><span class="stat-value" id="admin-total-pharmacists">0</span></div>
            <div class="stat-card"><span class="stat-label">Pending Cases</span><span class="stat-value" id="admin-pending-cases">0</span></div>
            <div class="stat-card"><span class="stat-label">Completed</span><span class="stat-value" id="admin-completed-cases">0</span></div>
          </div>
        </div>

        <div id="admin-tab-pharmacists" style="display:none;">
          <div class="admin-section">
            <h4>Add New Pharmacist</h4>
            <div class="dashboard-form">
              <div class="form-row">
                <input type="text" id="admin-ph-name" placeholder="Full Name">
                <input type="text" id="admin-ph-username" placeholder="Username">
              </div>
              <div class="form-row">
                <input type="email" id="admin-ph-email" placeholder="Email">
                <input type="text" id="admin-ph-license" placeholder="License Number (PH-XXXX)">
              </div>
              <div class="form-row">
                <input type="password" id="admin-ph-password" placeholder="Temporary Password">
              </div>
              <button class="btn btn-primary" onclick="createPharmacist()">Create Account</button>
            </div>
          </div>
          <div id="admin-pharmacists-list" style="margin-top:20px;"></div>
        </div>

        <div id="admin-tab-users" style="display:none;">
          <div id="admin-users-list"></div>
        </div>
      </section>
    </main>
  </div>
</div>

<script>window.BISARX_PORTAL = "admin";</script>
<script src="js/app.js?v=20260416-2"></script>
</body>
</html>
